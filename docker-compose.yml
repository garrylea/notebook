version: '3.9'

services:
  # ── PostgreSQL (production DB) ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smart_notepad_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notepad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notepad_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smart_notepad}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notepad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Fastify API) ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: smart_notepad_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-notepad}:${POSTGRES_PASSWORD:-notepad_secret}@postgres:5432/${POSTGRES_DB:-smart_notepad}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_2}
      UPLOADS_DIR: /app/uploads
      PORT: 3000
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations before starting the server
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend (Nginx + static assets) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: smart_notepad_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
    driver: local
  uploads_data:
    driver: local
